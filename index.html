<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
<meta name="theme-color" content="#0369a1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="계측변환">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>계측 변환기</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#f0f4f8;
  --surface:#ffffff;
  --surface2:#f8fafc;
  --border:#e2e8f0;
  --border-light:#f1f5f9;
  --text:#0f172a;
  --text2:#475569;
  --text3:#94a3b8;
  --blue:#0369a1;
  --blue-light:#e0f2fe;
  --blue-mid:#bae6fd;
  --orange:#c2410c;
  --orange-light:#fff7ed;
  --orange-mid:#fed7aa;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg:0 4px 12px rgba(0,0,0,0.08);
  --radius:14px;
}

html{-webkit-text-size-adjust:100%}
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
}

.app{
  max-width:460px;
  margin:0 auto;
  padding:0 12px 100px;
}

/* ── Header ── */
.hdr{
  text-align:center;
  padding:24px 0 18px;
}
.hdr h1{
  font-size:22px;
  font-weight:700;
  color:var(--blue);
  letter-spacing:-0.5px;
}
.hdr p{
  font-size:12px;
  color:var(--text3);
  margin-top:2px;
  font-weight:500;
}

/* ── Tabs ── */
.tabs{
  display:flex;
  background:var(--surface);
  border-radius:12px;
  padding:4px;
  box-shadow:var(--shadow);
  margin-bottom:18px;
  position:sticky;
  top:0;
  z-index:10;
}
.tab{
  flex:1;
  padding:12px 8px;
  border:none;
  border-radius:10px;
  background:transparent;
  font-family:'Outfit',sans-serif;
  font-size:14px;
  font-weight:600;
  color:var(--text3);
  cursor:pointer;
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.tab svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.tab.act-b{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(3,105,161,.3)}
.tab.act-o{background:var(--orange);color:#fff;box-shadow:0 2px 8px rgba(194,65,12,.3)}

/* ── Card ── */
.card{
  background:var(--surface);
  border-radius:var(--radius);
  padding:18px;
  margin-bottom:12px;
  box-shadow:var(--shadow);
}
.card-t{
  font-family:'DM Mono',monospace;
  font-size:11px;
  font-weight:500;
  text-transform:uppercase;
  letter-spacing:1.5px;
  color:var(--text3);
  margin-bottom:14px;
}

/* ── Inputs ── */
.row{display:flex;gap:10px;margin-bottom:12px}
.row:last-child{margin-bottom:0}
.grp{flex:1}
.grp label{
  display:block;
  font-size:12px;
  font-weight:500;
  color:var(--text2);
  margin-bottom:5px;
}
.grp input{
  width:100%;
  padding:11px 12px;
  border:1.5px solid var(--border);
  border-radius:10px;
  background:var(--surface2);
  color:var(--text);
  font-family:'DM Mono',monospace;
  font-size:16px;
  font-weight:500;
  outline:none;
  transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;
}
.grp input:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(3,105,161,.1);
}
.grp.orange input:focus{
  border-color:var(--orange);
  box-shadow:0 0 0 3px rgba(194,65,12,.1);
}
.grp .big-input{
  font-size:22px;
  padding:14px 50px 14px 14px;
  font-weight:500;
}
.input-wrap{position:relative}
.input-unit{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--text3);
  pointer-events:none;
}

/* ── Result ── */
.res{
  text-align:center;
  padding:22px 16px;
  border-radius:12px;
  margin-top:12px;
}
.res.blue{background:linear-gradient(135deg,var(--blue-light),#f0f9ff);border:1.5px solid var(--blue-mid)}
.res.orange{background:linear-gradient(135deg,var(--orange-light),#fffbeb);border:1.5px solid var(--orange-mid)}
.res-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;font-weight:500;margin-bottom:6px}
.res-val{font-family:'DM Mono',monospace;font-size:40px;font-weight:500;line-height:1}
.res-val.blue{color:var(--blue)}
.res-val.orange{color:var(--orange)}
.res-unit{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);margin-top:4px}

/* ── Progress ── */
.prog{margin-top:14px;padding:0 2px}
.prog-bar{height:6px;background:var(--border-light);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .35s ease}
.prog-fill.blue{background:linear-gradient(90deg,#0ea5e9,var(--blue))}
.prog-fill.orange{background:linear-gradient(90deg,#f97316,var(--orange))}
.prog-lbl{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-top:3px}

/* ── Detail Grid ── */
.det{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.det-item{background:var(--surface2);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--border-light)}
.det-item .v{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;color:var(--text)}
.det-item .l{font-size:10px;color:var(--text3);margin-top:1px;text-transform:uppercase;letter-spacing:1px;font-weight:500}

/* ── Toggle ── */
.tog{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:10px;margin-top:10px;
  border:1.5px dashed var(--border);border-radius:10px;
  background:transparent;color:var(--text3);
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;
}
.tog:active{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}

/* ── RTD type pills ── */
.pills{display:flex;gap:6px;margin-bottom:14px}
.pill{
  flex:1;padding:10px 6px;
  border:1.5px solid var(--border);border-radius:10px;
  background:var(--surface2);
  font-family:'DM Mono',monospace;font-size:13px;font-weight:500;
  color:var(--text3);text-align:center;
  cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;
}
.pill.on{border-color:var(--orange);background:var(--orange-light);color:var(--orange)}

/* ── RTD Table ── */
.rtbl{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;font-family:'DM Mono',monospace;font-size:11px}
.rtbl .th{background:var(--orange-light);color:var(--orange);padding:6px 4px;text-align:center;border-radius:4px;font-weight:500}
.rtbl .td{background:var(--surface2);color:var(--text2);padding:6px 4px;text-align:center;border-radius:4px}

/* ── Panel ── */
.pnl{display:none}
.pnl.on{display:block;animation:up .25s ease}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── Error ── */
.err{color:#dc2626;font-size:12px;text-align:center;margin-top:6px}

/* ── Install Banner ── */
.install-bar{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);
  border-top:1px solid var(--border);
  padding:14px 16px;
  box-shadow:0 -2px 10px rgba(0,0,0,.06);
  z-index:100;
  justify-content:space-between;align-items:center;
}
.install-bar.show{display:flex}
.install-bar span{font-size:13px;font-weight:500;color:var(--text2)}
.install-btn{
  padding:8px 18px;border:none;border-radius:8px;
  background:var(--blue);color:#fff;
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.install-close{
  background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;
  padding:4px 8px;-webkit-tap-highlight-color:transparent;
}
</style>
</head>
<body>

<div class="app">
  <div class="hdr">
    <h1>계측 변환기</h1>
    <p>Instrument Calculator</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab act-b" id="tS" onclick="go('s')">
      <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      스케일 변환
    </button>
    <button class="tab" id="tR" onclick="go('r')">
      <svg viewBox="0 0 24 24"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>
      RTD 온도
    </button>
  </div>

  <!-- ═══ Scale Panel ═══ -->
  <div class="pnl on" id="pS">
    <div class="card">
      <div class="card-t">입력 신호 범위</div>
      <div class="row">
        <div class="grp"><label>신호 최소</label><input type="number" id="sMin" value="4" inputmode="decimal" oninput="cS()"></div>
        <div class="grp"><label>신호 최대</label><input type="number" id="sMax" value="20" inputmode="decimal" oninput="cS()"></div>
      </div>
      <div class="card-t" style="margin-top:6px">출력 스케일 범위</div>
      <div class="row">
        <div class="grp"><label>스케일 최소</label><input type="number" id="oMin" value="0" inputmode="decimal" oninput="cS()"></div>
        <div class="grp"><label>스케일 최대</label><input type="number" id="oMax" value="100" inputmode="decimal" oninput="cS()"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-t">신호 → 스케일 변환</div>
      <div class="grp">
        <label>현재 신호값</label>
        <input type="number" id="sigIn" value="8" inputmode="decimal" step="0.01" oninput="cS()">
      </div>
      <div class="res blue">
        <div class="res-lbl">환산 값</div>
        <div class="res-val blue" id="sVal">25.00</div>
        <div class="res-unit" id="sUnit"></div>
      </div>
      <div class="prog">
        <div class="prog-bar"><div class="prog-fill blue" id="sProg" style="width:25%"></div></div>
        <div class="prog-lbl"><span id="sPL">0</span><span id="sPR">100</span></div>
      </div>
      <div class="det">
        <div class="det-item"><div class="v" id="sPct">25.0%</div><div class="l">퍼센트</div></div>
        <div class="det-item"><div class="v" id="sSpn">16.0</div><div class="l">신호 스팬</div></div>
      </div>
      <button class="tog" onclick="togRev()">↕ 스케일 → 신호 역변환</button>
    </div>

    <div class="card" id="revCard" style="display:none">
      <div class="card-t">스케일 → 신호 역변환</div>
      <div class="grp">
        <label>스케일 값 입력</label>
        <input type="number" id="revIn" value="50" inputmode="decimal" step="0.01" oninput="cR2()">
      </div>
      <div class="res blue">
        <div class="res-lbl">환산 신호값</div>
        <div class="res-val blue" id="revVal">12.00</div>
        <div class="res-unit"></div>
      </div>
    </div>
  </div>

  <!-- ═══ RTD Panel ═══ -->
  <div class="pnl" id="pR">
    <div class="card">
      <div class="card-t">RTD 타입</div>
      <div class="pills">
        <div class="pill on" onclick="setRT('pt100',this)">PT100</div>
        <div class="pill" onclick="setRT('pt1000',this)">PT1000</div>
        <div class="pill" onclick="setRT('jpt100',this)">JPT100</div>
      </div>
    </div>

    <div class="card">
      <div class="card-t">저항 → 온도</div>
      <div class="grp orange">
        <label>저항값 입력</label>
        <div class="input-wrap">
          <input class="big-input" type="number" id="rIn" value="100" inputmode="decimal" step="0.01" oninput="cRT()">
          <span class="input-unit" style="color:var(--orange)">Ω</span>
        </div>
      </div>
      <div class="res orange">
        <div class="res-lbl">온도</div>
        <div class="res-val orange" id="rtVal">0.00</div>
        <div class="res-unit">°C</div>
      </div>
      <div id="rtErr" class="err" style="display:none"></div>
      <div class="det">
        <div class="det-item"><div class="v" id="rtF">32.0°F</div><div class="l">화씨</div></div>
        <div class="det-item"><div class="v" id="rtK">273.2K</div><div class="l">절대온도</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-t">온도 → 저항</div>
      <div class="grp orange">
        <label>온도 입력</label>
        <div class="input-wrap">
          <input class="big-input" type="number" id="tIn" value="0" inputmode="decimal" step="0.1" oninput="cTR()">
          <span class="input-unit" style="color:var(--orange)">°C</span>
        </div>
      </div>
      <div class="res orange">
        <div class="res-lbl">저항값</div>
        <div class="res-val orange" id="trVal">100.00</div>
        <div class="res-unit">Ω</div>
      </div>
    </div>

    <div class="card">
      <div class="card-t">참조 테이블 · <span id="tblT">PT100</span></div>
      <div class="rtbl" id="rtTbl"></div>
    </div>
  </div>
</div>

<!-- Install Banner -->
<div class="install-bar" id="installBar">
  <span>홈 화면에 추가하기</span>
  <div>
    <button class="install-btn" id="installBtn">설치</button>
    <button class="install-close" id="installClose">✕</button>
  </div>
</div>

<script>
/* ══════ TAB SWITCH ══════ */
function go(t){
  document.getElementById('tS').className='tab'+(t==='s'?' act-b':'');
  document.getElementById('tR').className='tab'+(t==='r'?' act-o':'');
  document.getElementById('pS').className='pnl'+(t==='s'?' on':'');
  document.getElementById('pR').className='pnl'+(t==='r'?' on':'');
}

/* ══════ SCALE CALC ══════ */
function cS(){
  const lo=p('sMin'),hi=p('sMax'),oLo=p('oMin'),oHi=p('oMax'),cur=p('sigIn');
  if([lo,hi,oLo,oHi,cur].some(isNaN))return;
  const sp=hi-lo, r=sp?((cur-lo)/sp):0, v=oLo+r*(oHi-oLo), pct=r*100;
  document.getElementById('sVal').textContent=v.toFixed(2);
  document.getElementById('sPct').textContent=pct.toFixed(1)+'%';
  document.getElementById('sSpn').textContent=sp.toFixed(1);
  document.getElementById('sProg').style.width=Math.max(0,Math.min(100,pct))+'%';
  document.getElementById('sPL').textContent=oLo;
  document.getElementById('sPR').textContent=oHi;
}
function cR2(){
  const lo=p('sMin'),hi=p('sMax'),oLo=p('oMin'),oHi=p('oMax'),sv=p('revIn');
  if([lo,hi,oLo,oHi,sv].some(isNaN))return;
  const sp=oHi-oLo, r=sp?((sv-oLo)/sp):0;
  document.getElementById('revVal').textContent=(lo+r*(hi-lo)).toFixed(2);
}
let revOn=false;
function togRev(){revOn=!revOn;document.getElementById('revCard').style.display=revOn?'block':'none';if(revOn)cR2()}

/* ══════ RTD ══════ */
const C={
  pt100: {R0:100, A:3.9083e-3,B:-5.775e-7,C:-4.183e-12},
  pt1000:{R0:1000,A:3.9083e-3,B:-5.775e-7,C:-4.183e-12},
  jpt100:{R0:100, A:3.9739e-3,B:-5.870e-7,C:-4.4e-12}
};
let rt='pt100';

function setRT(t,el){
  rt=t;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('tblT').textContent=t.toUpperCase();
  cRT();cTR();bTbl();
}

function r2t(R){
  const{R0,A,B}=C[rt];
  if(R>=R0){
    const d=A*A-4*B*(1-R/R0);
    if(d<0)return null;
    return(-A+Math.sqrt(d))/(2*B);
  }
  let t=(R/R0-1)/A;
  for(let i=0;i<30;i++){
    const{C:Cc}=C[rt];
    const Rc=R0*(1+A*t+B*t*t+Cc*(t-100)*t*t*t);
    const dR=R0*(A+2*B*t+Cc*(4*t*t*t-300*t*t));
    const e=Rc-R;t-=e/dR;
    if(Math.abs(e)<1e-5)break;
  }
  return t;
}
function t2r(T){
  const{R0,A,B,C:Cc}=C[rt];
  return T>=0?R0*(1+A*T+B*T*T):R0*(1+A*T+B*T*T+Cc*(T-100)*T*T*T);
}

function cRT(){
  const R=p('rIn'),el=document.getElementById('rtErr');
  if(isNaN(R))return;
  const T=r2t(R);
  if(T===null||T<-200||T>850){
    document.getElementById('rtVal').textContent='---';
    el.textContent='범위 초과 (-200°C ~ 850°C)';el.style.display='block';
    document.getElementById('rtF').textContent='---';
    document.getElementById('rtK').textContent='---';return;
  }
  el.style.display='none';
  document.getElementById('rtVal').textContent=T.toFixed(2);
  document.getElementById('rtF').textContent=(T*9/5+32).toFixed(1)+'°F';
  document.getElementById('rtK').textContent=(T+273.15).toFixed(1)+'K';
}
function cTR(){
  const T=p('tIn');if(isNaN(T))return;
  document.getElementById('trVal').textContent=t2r(T).toFixed(2);
}

function bTbl(){
  const ts=[-50,0,50,100,150,200,250,300],el=document.getElementById('rtTbl');
  el.innerHTML='<div class="th">°C</div><div class="th">Ω</div><div class="th">°C</div><div class="th">Ω</div>';
  for(let i=0;i<ts.length;i+=2)
    el.innerHTML+=`<div class="td">${ts[i]}</div><div class="td">${t2r(ts[i]).toFixed(2)}</div><div class="td">${ts[i+1]}</div><div class="td">${t2r(ts[i+1]).toFixed(2)}</div>`;
}

function p(id){return parseFloat(document.getElementById(id).value)}

/* ══════ PWA Install ══════ */
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('installBar').classList.add('show');
});
document.getElementById('installBtn').addEventListener('click',()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('installBar').classList.remove('show')});
});
document.getElementById('installClose').addEventListener('click',()=>{
  document.getElementById('installBar').classList.remove('show');
});

/* ══════ Register SW ══════ */
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}

/* ══════ Init ══════ */
cS();cRT();cTR();bTbl();
</script>
</body>
</html>
